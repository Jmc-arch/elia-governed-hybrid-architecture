name: ELIA Tests (Stage 0 + Stage 1)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run tests
        run: |
          # Ajoute la racine du projet au PYTHONPATH (obligatoire pour stage1/ et stage0/)
          export PYTHONPATH=$PYTHONPATH:$(pwd)
          echo "PYTHONPATH = ${PYTHONPATH}"

          # -s tests  = dossier des tests
          # -t .      = racine du projet comme top-level directory (corrige les imports stage1.xxx)
          # -v        = verbose
          python -m unittest discover -s tests -t . -v
