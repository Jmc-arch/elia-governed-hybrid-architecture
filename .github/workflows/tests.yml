name: ELIA Tests (Stage 0 + Stage 1)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run tests
        run: |
          # Ajoute la racine du projet au PYTHONPATH pour importer stage0 et stage1
          export PYTHONPATH=$PYTHONPATH:$(pwd)
          echo "PYTHONPATH = ${PYTHONPATH}"

          # Lancement explicite des tests pour éviter les problèmes d'import avec unittest discover
          python -m unittest tests.test_el_mem -v
          python -m unittest tests.test_recovery -v
          python -m unittest tests.test_resilience -v
          python -m unittest tests.test_sm_hub -v
          python -m unittest tests.test_stage1_sm_log -v
          python -m unittest tests.test_stage1_sm_syn -v
          python -m unittest tests.test_warmup_policy -v
